<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>英语错题线上练习 Demo</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2329;
      --sub: #646a73;
      --line: #e5e6eb;
      --blue: #4c8bf5;
      --green: #22b07d;
      --orange: #ff9f43;
      --red: #f04d4f;
      --tag: #eef3ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }
    .wrap {
      width: min(980px, calc(100vw - 32px));
      margin: 28px auto 48px;
    }
    .hero {
      background: linear-gradient(135deg, #4c8bf5, #7b61ff);
      color: white;
      border-radius: 24px;
      padding: 28px 28px 22px;
      box-shadow: 0 12px 32px rgba(76,139,245,.22);
    }
    .hero h1 { margin: 0 0 8px; font-size: 30px; }
    .hero p { margin: 0; opacity: .92; }
    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    button {
      border: 0;
      background: var(--blue);
      color: white;
      padding: 11px 16px;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
    }
    button.secondary {
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.28);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin: 20px 0;
    }
    .stat {
      background: var(--card);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(31,35,41,.06);
    }
    .stat .label { color: var(--sub); font-size: 13px; }
    .stat .value { font-size: 28px; font-weight: 700; margin-top: 6px; }
    .card {
      background: var(--card);
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 10px 24px rgba(31,35,41,.06);
    }
    .meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .tag {
      background: var(--tag);
      color: #3556a8;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
    }
    .question {
      font-size: 24px;
      font-weight: 700;
      margin: 8px 0 18px;
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .answer-area {
      display: grid;
      gap: 12px;
      margin-top: 8px;
    }
    .mode-tip {
      color: var(--sub);
      font-size: 14px;
      margin-bottom: 2px;
    }
    .question-image-wrap {
      display: none;
      margin: 8px 0 4px;
    }
    .question-image-wrap.show {
      display: block;
    }
    .question-image-wrap img {
      width: 100%;
      max-height: 420px;
      object-fit: contain;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #fff;
    }
    .image-note {
      color: var(--sub);
      font-size: 13px;
      margin-top: 8px;
    }
    input[type="text"], textarea {
      flex: 1;
      min-width: 220px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--line);
      font-size: 16px;
      outline: none;
      background: #fff;
      font-family: inherit;
    }
    textarea {
      width: 100%;
      min-height: 108px;
      resize: vertical;
    }
    input[type="text"]:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(76,139,245,.1);
    }
    .choices {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .choice-btn {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
      min-width: 64px;
      font-weight: 700;
    }
    .choice-btn.active {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }
    .result {
      margin-top: 18px;
      padding: 18px;
      border-radius: 16px;
      display: none;
    }
    .result.show { display: block; }
    .ok { background: rgba(34,176,125,.10); border: 1px solid rgba(34,176,125,.22); }
    .bad { background: rgba(240,77,79,.08); border: 1px solid rgba(240,77,79,.18); }
    .result h3 { margin: 0 0 10px; }
    .kv { margin: 7px 0; }
    .kv b { display: inline-block; min-width: 96px; }
    .hint {
      margin-top: 16px;
      color: var(--sub);
      font-size: 14px;
    }
    .list {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }
    .mini {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
    }
    .mini strong { display: block; }
    .mini span { color: var(--sub); font-size: 13px; }
    .mini button { padding: 8px 12px; font-size: 13px; }
    @media (max-width: 760px) {
      .stats { grid-template-columns: 1fr; }
      .question { font-size: 20px; }
      .wrap { width: min(980px, calc(100vw - 20px)); margin-top: 16px; }
      .hero, .card { padding: 18px; border-radius: 18px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>英语错题线上练习 Demo</h1>
      <p>先自己填，提交后再显示正确答案、知识点、错因提醒，以及这是第几次做这道题。</p>
      <div class="toolbar">
        <button class="secondary" id="toggleHiddenBtn">显示已隐藏题</button>
        <button class="secondary" id="restoreHiddenBtn">恢复全部题目</button>
        <button class="secondary" id="resetAll">重置全部练习记录</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="label">题库题数</div>
        <div class="value" id="totalCount">0</div>
      </div>
      <div class="stat">
        <div class="label">当前题已练次数</div>
        <div class="value" id="attemptCount">0</div>
      </div>
      <div class="stat">
        <div class="label">当前题最近结果</div>
        <div class="value" id="lastResult">-</div>
      </div>
      <div class="stat">
        <div class="label">已隐藏题数</div>
        <div class="value" id="hiddenCount">0</div>
      </div>
    </div>

    <div class="card">
      <div class="meta" id="meta"></div>
      <div class="question" id="question"></div>
      <div class="question-image-wrap" id="questionImageWrap">
        <img id="questionImage" alt="题目配图" />
        <div class="image-note" id="imageNote"></div>
      </div>
      <div class="answer-area">
        <div class="mode-tip" id="modeTip"></div>
        <div id="textWrap" class="row">
          <input id="answerInput" type="text" placeholder="在这里填答案…" />
        </div>
        <div id="textareaWrap" style="display:none;">
          <textarea id="answerTextarea" placeholder="在这里写答案…"></textarea>
        </div>
        <div id="choiceWrap" class="choices" style="display:none;"></div>
        <div class="row">
          <button id="submitBtn">提交答案</button>
          <button id="nextBtn">下一题</button>
        </div>
      </div>
      <div class="result" id="resultBox">
        <h3 id="resultTitle"></h3>
        <div class="kv"><b>你的答案：</b><span id="yourAnswer"></span></div>
        <div class="kv"><b>正确答案：</b><span id="correctAnswer"></span></div>
        <div class="kv"><b>知识点：</b><span id="knowledge"></span></div>
        <div class="kv"><b>错因提醒：</b><span id="reason"></span></div>
        <div class="kv"><b>第几次做：</b><span id="attemptText"></span></div>
        <div class="hint">这个 demo 现在是本地记次数：同一浏览器里会记住练习次数。后面可以再接飞书题库，做成正式版。</div>
      </div>
    </div>

    <div class="list" id="questionList"></div>
  </div>

  <script>
    let questions = [];
    const stateKey = 'english-practice-demo-v4';
    const saved = JSON.parse(localStorage.getItem(stateKey) || '{}');
    let currentIndex = 0;
    let selectedChoice = '';
    let showHidden = false;

    const $ = (id) => document.getElementById(id);
    const meta = $('meta');
    const question = $('question');
    const questionImageWrap = $('questionImageWrap');
    const questionImage = $('questionImage');
    const imageNote = $('imageNote');
    const modeTip = $('modeTip');
    const answerInput = $('answerInput');
    const answerTextarea = $('answerTextarea');
    const textWrap = $('textWrap');
    const textareaWrap = $('textareaWrap');
    const choiceWrap = $('choiceWrap');
    const resultBox = $('resultBox');
    const resultTitle = $('resultTitle');
    const yourAnswer = $('yourAnswer');
    const correctAnswer = $('correctAnswer');
    const knowledge = $('knowledge');
    const reason = $('reason');
    const attemptText = $('attemptText');
    const totalCount = $('totalCount');
    const attemptCount = $('attemptCount');
    const lastResult = $('lastResult');
    const hiddenCount = $('hiddenCount');
    const questionList = $('questionList');
    const toggleHiddenBtn = $('toggleHiddenBtn');
    const restoreHiddenBtn = $('restoreHiddenBtn');

    function getRecord(id) {
      return saved[id] || { attempts: 0, lastResult: null, correctCount: 0, hidden: false };
    }

    function setRecord(id, data) {
      saved[id] = { ...getRecord(id), ...data };
      localStorage.setItem(stateKey, JSON.stringify(saved));
    }

    function visibleQuestions() {
      return questions.filter(q => showHidden || !getRecord(q.id).hidden);
    }

    function allHiddenCount() {
      return questions.filter(q => getRecord(q.id).hidden).length;
    }

    function ensureCurrentIndexValid() {
      const visible = visibleQuestions();
      if (!visible.length) {
        currentIndex = 0;
        return;
      }
      if (currentIndex >= visible.length) currentIndex = 0;
    }

    function currentQuestion() {
      const visible = visibleQuestions();
      if (!visible.length) return null;
      ensureCurrentIndexValid();
      return visible[currentIndex];
    }

    function refreshToolbar() {
      hiddenCount.textContent = allHiddenCount();
      toggleHiddenBtn.textContent = showHidden ? '只看未隐藏题' : '显示已隐藏题';
      restoreHiddenBtn.disabled = allHiddenCount() === 0;
      restoreHiddenBtn.style.opacity = allHiddenCount() === 0 ? '.55' : '1';
      totalCount.textContent = visibleQuestions().length;
    }

    function updateSideList() {
      if (!questions.length) {
        questionList.innerHTML = '<div class="mini"><div><strong>题库加载中…</strong><span>请稍等</span></div></div>';
        return;
      }
      const visible = visibleQuestions();
      if (!visible.length) {
        questionList.innerHTML = '<div class="mini"><div><strong>太好了，当前题都毕业了</strong><span>你可以点“显示已隐藏题”回看，或点“恢复全部题目”重新开始。</span></div></div>';
        return;
      }
      questionList.innerHTML = visible.map((q, idx) => {
        const record = getRecord(q.id);
        const text = record.lastResult === 'correct' ? '最近：做对' : record.lastResult === 'wrong' ? '最近：做错' : '还没做';
        const hiddenTag = record.hidden ? ' · 已隐藏' : '';
        return `
          <div class="mini">
            <div>
              <strong>${q.label}｜${q.type}${q.image ? '｜带图' : ''}</strong>
              <span>已练 ${record.attempts} 次 · 做对 ${record.correctCount || 0} 次 · ${text}${hiddenTag}</span>
            </div>
            <button onclick="pickQuestion(${idx})">切到这题</button>
          </div>
        `;
      }).join('');
    }

    function renderChoiceButtons(q) {
      const options = q.options || {};
      choiceWrap.innerHTML = Object.entries(options).map(([key, value]) => `
        <button type="button" class="choice-btn ${selectedChoice === key ? 'active' : ''}" onclick="pickChoice('${key}')">${key}. ${value}</button>
      `).join('');
    }

    function renderAnswerUI(q) {
      selectedChoice = '';
      textWrap.style.display = 'none';
      textareaWrap.style.display = 'none';
      choiceWrap.style.display = 'none';
      answerInput.value = '';
      answerTextarea.value = '';

      if (q.answerMode === 'choice') {
        choiceWrap.style.display = 'flex';
        renderChoiceButtons(q);
      } else if (q.answerMode === 'short_answer') {
        textareaWrap.style.display = 'block';
        answerTextarea.placeholder = '用短语或完整句作答…';
      } else {
        textWrap.style.display = 'flex';
        answerInput.placeholder = q.answerMode === 'initial' ? `按提示补全：${q.initialHint || ''}` : '在这里填答案…';
      }
    }

    function renderQuestion() {
      refreshToolbar();
      if (!questions.length) {
        meta.innerHTML = '<span class="tag">题库加载中</span>';
        question.textContent = '正在读取第一版线上练习题库…';
        modeTip.textContent = '';
        attemptCount.textContent = '0';
        lastResult.textContent = '-';
        return;
      }
      const q = currentQuestion();
      if (!q) {
        meta.innerHTML = '<span class="tag">当前没有可练题目</span>';
        question.textContent = '这一轮题目都已经累计做对 3 次并自动隐藏了。';
        modeTip.textContent = '你可以点“显示已隐藏题”回看，或者点“恢复全部题目”重新开始。';
        resultBox.className = 'result';
        attemptCount.textContent = '0';
        lastResult.textContent = '毕业';
        textWrap.style.display = 'none';
        textareaWrap.style.display = 'none';
        choiceWrap.style.display = 'none';
        questionImageWrap.className = 'question-image-wrap';
        return;
      }
      const record = getRecord(q.id);
      meta.innerHTML = `
        <span class="tag">${q.label}</span>
        <span class="tag">${q.type}</span>
        <span class="tag">${q.source}</span>
        <span class="tag">累计做对 ${record.correctCount || 0} / 3</span>
        ${record.hidden ? '<span class="tag">已隐藏</span>' : ''}
      `;
      question.textContent = q.prompt;
      modeTip.textContent = q.instruction || '直接输入答案';
      if (q.image) {
        questionImageWrap.className = 'question-image-wrap show';
        questionImage.src = q.image + '?_=' + Date.now();
        imageNote.textContent = q.imageDescription || '先看图，再作答。';
      } else {
        questionImageWrap.className = 'question-image-wrap';
        questionImage.removeAttribute('src');
        imageNote.textContent = '';
      }
      resultBox.className = 'result';
      attemptCount.textContent = record.attempts;
      lastResult.textContent = record.lastResult === 'correct' ? '做对' : record.lastResult === 'wrong' ? '做错' : '-';
      renderAnswerUI(q);
      if (q.answerMode === 'short_answer') answerTextarea.focus();
      else if (q.answerMode !== 'choice') answerInput.focus();
    }

    function normalize(s) {
      return String(s || '').trim().toLowerCase().replace(/[“”"'.,!?]/g, '');
    }

    function getUserAnswer(q) {
      if (q.answerMode === 'choice') return selectedChoice;
      if (q.answerMode === 'short_answer') return answerTextarea.value.trim();
      return answerInput.value.trim();
    }

    function submitAnswer() {
      const q = currentQuestion();
      if (!q) return;
      const input = getUserAnswer(q);
      if (!input) {
        if (q.answerMode === 'short_answer') answerTextarea.focus();
        else if (q.answerMode !== 'choice') answerInput.focus();
        return;
      }
      const record = getRecord(q.id);
      const nextAttempts = record.attempts + 1;
      const isCorrect = q.answerMode === 'choice' ? input === (q.correctChoice || q.answer) : normalize(input) === normalize(q.answer);
      const correctCount = (record.correctCount || 0) + (isCorrect ? 1 : 0);
      const hidden = correctCount >= 3;
      setRecord(q.id, { attempts: nextAttempts, lastResult: isCorrect ? 'correct' : 'wrong', correctCount, hidden });

      resultBox.className = `result show ${isCorrect ? 'ok' : 'bad'}`;
      resultTitle.textContent = isCorrect ? (hidden ? '这题累计做对 3 次，已自动隐藏。' : '这题做对了。') : '这题做错了。';
      yourAnswer.textContent = q.answerMode === 'choice' ? `${input}. ${q.options?.[input] || ''}` : input;
      correctAnswer.textContent = q.answerMode === 'choice' ? `${q.correctChoice || q.answer}. ${q.options?.[q.correctChoice || q.answer] || ''}` : q.answer;
      knowledge.textContent = q.knowledge;
      reason.textContent = q.reason;
      attemptText.textContent = hidden ? `第 ${nextAttempts} 次（累计做对 ${correctCount} 次，已毕业隐藏）` : `第 ${nextAttempts} 次（累计做对 ${correctCount} 次）`;
      attemptCount.textContent = nextAttempts;
      lastResult.textContent = isCorrect ? '做对' : '做错';
      refreshToolbar();
      updateSideList();

      if (hidden && !showHidden) {
        setTimeout(() => {
          const visible = visibleQuestions();
          if (visible.length) {
            if (currentIndex >= visible.length) currentIndex = 0;
          } else {
            currentIndex = 0;
          }
          renderQuestion();
        }, 900);
      }
    }

    function nextQuestion() {
      const visible = visibleQuestions();
      if (!visible.length) return;
      currentIndex = (currentIndex + 1) % visible.length;
      renderQuestion();
    }

    window.pickQuestion = function(idx) {
      currentIndex = idx;
      renderQuestion();
    }

    window.pickChoice = function(opt) {
      selectedChoice = opt;
      const q = currentQuestion();
      if (q) renderChoiceButtons(q);
    }

    async function loadQuestions() {
      try {
        const res = await fetch('./questions.json?_=' + Date.now());
        questions = await res.json();
        refreshToolbar();
        updateSideList();
        renderQuestion();
      } catch (e) {
        meta.innerHTML = '<span class="tag">加载失败</span>';
        question.textContent = '题库加载失败，请稍后刷新重试。';
        questionList.innerHTML = '<div class="mini"><div><strong>题库加载失败</strong><span>请检查 questions.json 是否存在</span></div></div>';
      }
    }

    $('submitBtn').addEventListener('click', submitAnswer);
    $('nextBtn').addEventListener('click', nextQuestion);
    toggleHiddenBtn.addEventListener('click', () => {
      showHidden = !showHidden;
      currentIndex = 0;
      updateSideList();
      renderQuestion();
    });
    restoreHiddenBtn.addEventListener('click', () => {
      Object.keys(saved).forEach(id => {
        saved[id] = { ...getRecord(id), hidden: false, correctCount: 0, attempts: 0, lastResult: null };
      });
      localStorage.setItem(stateKey, JSON.stringify(saved));
      showHidden = false;
      currentIndex = 0;
      updateSideList();
      renderQuestion();
    });
    $('resetAll').addEventListener('click', () => {
      localStorage.removeItem(stateKey);
      location.reload();
    });
    answerInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitAnswer();
    });
    answerTextarea.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') submitAnswer();
    });

    refreshToolbar();
    updateSideList();
    renderQuestion();
    loadQuestions();
  </script>
</body>
</html>
